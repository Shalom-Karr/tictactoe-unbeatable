<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unbeatable Tic-Tac-Toe</title>
    <style>
        /* Internal CSS for styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #282c34;
            color: white;
            margin-top: 50px;
        }
        h1 {
            color: #61dafb;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-gap: 5px;
            background-color: #61dafb;
            padding: 5px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background-color: #282c34;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .cell:hover {
            background-color: #3a3f4b;
        }
        .cell.X {
            color: #ff6b6b;
        }
        .cell.O {
            color: #4ecdc4;
        }
        #message {
            font-size: 1.5rem;
            height: 30px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 1.2rem;
            background-color: #61dafb;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #282c34;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #4fa8c2;
        }
    </style>
</head>
<body>

    <h1>Unbeatable Tic-Tac-Toe</h1>
    <div id="message">You are X. It's your turn.</div>
    
    <div class="board" id="board">
        <div class="cell" onclick="humanMove(0)"></div>
        <div class="cell" onclick="humanMove(1)"></div>
        <div class="cell" onclick="humanMove(2)"></div>
        <div class="cell" onclick="humanMove(3)"></div>
        <div class="cell" onclick="humanMove(4)"></div>
        <div class="cell" onclick="humanMove(5)"></div>
        <div class="cell" onclick="humanMove(6)"></div>
        <div class="cell" onclick="humanMove(7)"></div>
        <div class="cell" onclick="humanMove(8)"></div>
    </div>

    <button onclick="resetBoard()">Restart Game</button>

    <script>
        // --- GAME STATE ---
        let board = ['', '', '', '', '', '', '', '', ''];
        let gameOver = false;
        const HUMAN = 'X';
        const AI = 'O';

        // --- GAME LOGIC ---
        function checkWinner(currentBoard) {
            const winConditions = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
                [0, 4, 8], [2, 4, 6]             // Diagonals
            ];

            for (let condition of winConditions) {
                const [a, b, c] = condition;
                if (currentBoard[a] !== '' && 
                    currentBoard[a] === currentBoard[b] && 
                    currentBoard[a] === currentBoard[c]) {
                    return currentBoard[a]; // Returns 'X' or 'O'
                }
            }

            if (!currentBoard.includes('')) {
                return 'TIE';
            }

            return null;
        }

        // --- MINIMAX ALGORITHM ---
        function minimax(currentBoard, depth, isMaximizing) {
            let winner = checkWinner(currentBoard);
            if (winner === AI) return 10 - depth;
            if (winner === HUMAN) return depth - 10;
            if (winner === 'TIE') return 0;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (currentBoard[i] === '') {
                        currentBoard[i] = AI;
                        let score = minimax(currentBoard, depth + 1, false);
                        currentBoard[i] = '';
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (currentBoard[i] === '') {
                        currentBoard[i] = HUMAN;
                        let score = minimax(currentBoard, depth + 1, true);
                        currentBoard[i] = '';
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function getBestMove() {
            let bestScore = -Infinity;
            let move = -1;
            for (let i = 0; i < 9; i++) {
                if (board[i] === '') {
                    board[i] = AI;
                    let score = minimax(board, 0, false);
                    board[i] = '';
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            return move;
        }

        // --- UI INTERACTION ---
        function updateUI() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, i) => {
                cell.innerText = board[i];
                cell.className = 'cell ' + board[i]; // Add class for CSS styling
            });
        }

        function handleGameEnd(winner) {
            gameOver = true;
            const messageEl = document.getElementById('message');
            if (winner === 'TIE') {
                messageEl.innerText = "It's a Tie!";
            } else {
                messageEl.innerText = `${winner} Wins!`;
            }
        }

        function humanMove(index) {
            if (board[index] !== '' || gameOver) return;

            // 1. Human makes a move
            board[index] = HUMAN;
            updateUI();
            
            let winner = checkWinner(board);
            if (winner) {
                handleGameEnd(winner);
                return;
            }

            // 2. AI makes a move
            document.getElementById('message').innerText = 'AI is thinking...';
            
            // Add a tiny delay so the AI doesn't feel instantly robotic
            setTimeout(() => {
                let bestMove = getBestMove();
                if (bestMove !== -1) {
                    board[bestMove] = AI;
                }
                
                updateUI();
                
                winner = checkWinner(board);
                if (winner) {
                    handleGameEnd(winner);
                } else {
                    document.getElementById('message').innerText = "Your turn.";
                }
            }, 50);
        }

        function resetBoard() {
            board = ['', '', '', '', '', '', '', '', ''];
            gameOver = false;
            document.getElementById('message').innerText = "You are X. It's your turn.";
            updateUI();
        }
    </script>
</body>
</html>
